version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: vct_cms_db
    restart: always
    environment:
      POSTGRES_USER: vctadmin
      POSTGRES_PASSWORD: vctpassword
      POSTGRES_DB: vct_cms
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Uncomment when backend is containerized
  # api:
  #   build: .
  #   container_name: vct_cms_api
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     - db
  #   environment:
  #     DB_HOST: db
  #     DB_PORT: 5432
  #     DB_USER: vctadmin
  #     DB_PASSWORD: vctpassword
  #     DB_NAME: vct_cms

volumes:
  pgdata:

backend:
  # Sử dụng GitHub API trực tiếp. Thay repo bằng <username>/<repo> thực tế
  name: github
  repo: vct-platform/vct-website
  branch: main

# Tùy chọn: Sử dụng Sveltia CMS Auth hoặc 1 server OAuth trung gian nếu không dùng Netlify
# base_url: https://your-server.com
# auth_endpoint: oauth/auth

# Cấu hình lưu trữ hình ảnh
media_folder: "assets/images"
public_folder: "/assets/images"

# Đồng bộ commit tự động
publish_mode: simple
site_url: https://vct-platform.github.io/vct-website

collections:
  # 1. QUẢN LÝ BLOG (Data File)
  - label: "Blog & Tin tức"
    name: "blog"
    files:
      - label: "Dữ liệu Bài viết"
        name: "posts"
        file: "data/posts.json"
        # posts.json là 1 mảng các object. Decap map nó vào một list field ảo
        fields:
          - label: "Danh sách Bài viết"
            name: "posts"
            widget: "list"
            fields:
              - {label: "ID (slug)", name: "id", widget: "string"}
              - {label: "Tiêu đề", name: "title", widget: "string"}
              - {label: "Ngày đăng", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
              - {label: "Tóm tắt", name: "summary", widget: "text"}
              - {label: "Ảnh đại diện / Icon", name: "thumbnail", widget: "image", required: false}
              - {label: "Danh mục", name: "category", widget: "select", options: ["news", "guide", "community", "event"]}
              - {label: "Tags", name: "tags", widget: "list"}
              - {label: "Link", name: "link", widget: "string", default: "#"}

  # 2. QUẢN LÝ CONTENT PITCH
  - label: "Landing Page (Pitch)"
    name: "pitch"
    files:
      - label: "Dữ liệu Pitch Deck"
        name: "pitch_data"
        file: "data/pitch.json"
        fields:
          - label: "Tiêu đề Hero", name: "hero_title", widget: "string", default: "Nền tảng Số hóa Toàn diện"
          - label: "Phiên bản", name: "version", widget: "string", default: "v7.0"
          - label: "Thống kê (Stats)", name: "stats", widget: "list", fields:
            - {label: "Số lượng", name: "value", widget: "string"}
            - {label: "Nhãn", name: "label", widget: "string"}

  # 3. QUẢN LÝ ĐA NGÔN NGỮ (i18n)
  - label: "Đa ngôn ngữ (i18n)"
    name: "i18n"
    files:
      - label: "Tiếng Việt"
        name: "vi"
        file: "data/lang/vi.json"
        fields:
          - label: "Dữ liệu Dịch (JSON)", name: "translations", widget: "code", default_language: "json", output_code_only: true
      - label: "Tiếng Anh"
        name: "en"
        file: "data/lang/en.json"
        fields:
          - label: "Dữ liệu Dịch (JSON)", name: "translations", widget: "code", default_language: "json", output_code_only: true

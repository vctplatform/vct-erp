openapi: 3.0.3
info:
  title: VCT Platform API
  version: 1.0.0
  description: API documentation for VCT Platform (Ban Tổ Chức Giải, Võ Sinh, CLB, etc.)
servers:
  - url: /api/v1
    description: V1 REST API
paths:
  /auth/login:
    post:
      summary: User login
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      token:
                        type: string
  /healthz:
    get:
      summary: Health check
      tags:
        - System
      responses:
        '200':
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []

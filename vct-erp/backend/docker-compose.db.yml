services:
  postgres:
    image: postgres:16-alpine
    container_name: vct-erp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vct_erp_2026
      POSTGRES_DB: vct_ledger
    ports:
      - "55432:5432"
    volumes:
      - vct_erp_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vct_ledger"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: vct-erp-redis
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - vct_erp_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  mongo:
    image: mongo:7
    container_name: vct-erp-mongo
    ports:
      - "27018:27017"
    volumes:
      - vct_erp_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 10s
      retries: 12

volumes:
  vct_erp_postgres_data:
  vct_erp_redis_data:
  vct_erp_mongo_data:

replicaCount: 2

image:
  repository: ghcr.io/vct-group/vct-finance-api
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: finance-api.local
  path: /
  tls: []
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "75"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  APP_ENV: production
  HTTP_ADDR: :8080
  CORS_ALLOWED_ORIGINS: https://command-center.vct.local,http://localhost:3000
  DB_DSN: postgres://postgres:vct_erp_2026@postgresql:5432/vct_ledger?sslmode=disable
  REDIS_URL: redis://redis-master:6379/0
  MONGO_URI: mongodb://mongodb:27017
  FINANCE_EVENTS_CHANNEL: finance.dashboard.events
  DASHBOARD_CACHE_TTL: 60s
  REDIS_STREAM_KEY: ledger.events
  ACCOUNT_CACHE_TTL: 15m
  APP_ROLE_HEADER: X-App-Role
  APP_ACTOR_HEADER: X-Actor-ID
  IDEMPOTENCY_HEADER: Idempotency-Key

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001

terminationGracePeriodSeconds: 45

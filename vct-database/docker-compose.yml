version: '3.8'

services:
  # ── PostgreSQL Database (v3.0) ──────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    container_name: vct_postgres
    environment:
      POSTGRES_USER: vct_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
      POSTGRES_DB: vct_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/backups:/backups
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    networks:
      - vct_global_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vct_user -d vct_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PgBouncer (Connection Pooler) ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: vct_pgbouncer
    environment:
      DB_USER: vct_user
      DB_PASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
      DB_HOST: postgres
      DB_NAME: vct_platform
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 60
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct_global_net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    restart: unless-stopped

  # ── Database Migrations (One-shot) ────────────────────────
  migrate:
    image: postgres:18.3-alpine
    container_name: vct_migrate
    volumes:
      - ./scripts/migrate.sh:/migrate.sh:ro
      - ./migrations:/migrations:ro
      - ./seeds:/seeds:ro
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vct_platform
      DB_USER: vct_user
      DB_PASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
      MIGRATION_DIR: /migrations
    entrypoint: ["/bin/sh", "/migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct_global_net
    profiles:
      - tools

  # ── Database Backup (daily at 2 AM) ────────────────────────
  db-backup:
    image: postgres:18.3-alpine
    container_name: vct_db_backup
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ./scripts/backup-verify.sh:/backup-verify.sh:ro
      - backup_data:/backups
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vct_platform
      DB_USER: vct_user
      DB_PASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
      BACKUP_DIR: /backups
      RETAIN_DAILY: "7"
      RETAIN_WEEKLY: "4"
    entrypoint: >
      /bin/sh -c "
        chmod +x /backup.sh /backup-verify.sh &&
        echo '0 2 * * * /backup.sh >> /var/log/backup.log 2>&1 && /backup-verify.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct_global_net
    restart: unless-stopped

networks:
  vct_global_net:
    driver: bridge
    name: vct_global_net

volumes:
  postgres_data:
  wal_archive:
  backup_data:

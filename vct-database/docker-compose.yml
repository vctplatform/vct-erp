version: '3.8'

services:
  # ── PostgreSQL Database (v3.0) ──────────────────────────────
  postgres:
    image: postgres:18.3-alpine
    container_name: vct_postgres
    environment:
      POSTGRES_USER: vct_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
      POSTGRES_DB: vct_platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - wal_archive:/var/lib/postgresql/wal_archive
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/backups:/backups
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    networks:
      - vct_global_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vct_user -d vct_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PgBouncer (Connection Pooler) ─────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: vct_pgbouncer
    environment:
      DB_USER: vct_user
      DB_PASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
      DB_HOST: postgres
      DB_NAME: vct_platform
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 500
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      SERVER_IDLE_TIMEOUT: 60
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct_global_net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    restart: unless-stopped

  # ── Database Migrations (One-shot) ────────────────────────
  migrate:
    image: postgres:18.3-alpine
    container_name: vct_migrate
    volumes:
      - ./migrations:/migrations
      - ./seeds:/seeds
    environment:
      PGPASSWORD: ${DB_PASSWORD:-vct_secure_password_123!}
    command: >
      sh -c '
        echo "⏳ Đang chạy v3.0 core_store Master Migration..." &&
        psql -h postgres -U vct_user -d vct_platform -f /migrations/migrate_v3_all.sql &&
        echo "✅ VCT DATABASE v3.0 MIGRATION COMPLETE!"
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vct_global_net
    profiles:
      - tools

networks:
  vct_global_net:
    driver: bridge
    name: vct_global_net

volumes:
  postgres_data:
  wal_archive:
